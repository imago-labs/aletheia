name: Test and static analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  hardhat:
    name: Hardhat compile + unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install

      - name: Compile contracts
        run: npx hardhat compile

      - name: Run unit tests
        # Allow this to fail until the test suite is fully populated;
        # we still want the rest of the matrix to run.
        run: npx hardhat test || echo "::warning::Hardhat tests incomplete; failing soft for now."

  slither:
    name: Slither static analysis
    runs-on: ubuntu-latest
    needs: hardhat

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install JS dependencies
        run: npm ci || npm install

      - name: Run Slither
        uses: crytic/slither-action@v0.4.0
        id: slither
        continue-on-error: true
        with:
          target: "contracts/"
          slither-config: ".slither.config.json"
          fail-on: high
          sarif: results.sarif

      - name: Upload SARIF
        if: always() && hashFiles('results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif

  mythril:
    name: Mythril symbolic execution
    runs-on: ubuntu-latest
    needs: hardhat
    continue-on-error: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Mythril
        run: pip install mythril

      - name: Analyze pool contract
        run: |
          myth analyze contracts/AletheiaPool.sol --solv 0.8.20 --execution-timeout 180 --max-depth 12 || echo "::warning::Mythril surfaced findings; review the output."
